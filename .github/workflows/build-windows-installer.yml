name: Build Windows installer

# Builds the self-contained ChirpaSetup.exe on a Windows runner.
#  • Push a version tag (e.g. v1.0.0) → builds and attaches the installer to a
#    GitHub Release of the same name.
#  • Run manually (workflow_dispatch) → builds and uploads the installer as a
#    downloadable workflow artifact (no release created).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publish a release under this tag (e.g. v1.0.0). Leave blank to only upload a build artifact.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build ChirpaSetup.exe
        shell: pwsh
        run: ./windows/build.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChirpaSetup
          path: windows/dist/ChirpaSetup.exe
          if-no-files-found: error

      - name: Attach installer to release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/dist/ChirpaSetup.exe
          generate_release_notes: true

      - name: Publish release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: windows/dist/ChirpaSetup.exe
          generate_release_notes: true
